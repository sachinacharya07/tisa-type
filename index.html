<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TISA Type</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ededea;
  --paper:#faf8f4;
  --ink:#1a1a18;
  --red:#c0392b;
  --muted:#9a9488;
  --border:#d4cfc5;
  --shadow:rgba(0,0,0,0.10);
}
html,body{height:100%;overflow:hidden;background:var(--bg);user-select:none;}
.layout{display:grid;grid-template-columns:240px 1fr;height:100vh;}

/* LEFT */
.left{padding:2.5rem 1.75rem;display:flex;flex-direction:column;gap:1.1rem;border-right:1px solid var(--border);overflow:hidden;background:var(--bg);}
.title{font-family:"Special Elite",serif;font-size:2rem;line-height:1;color:var(--ink);}
.title span{color:var(--red);}
.blurb{font-family:"Courier Prime",monospace;font-size:0.72rem;line-height:1.9;color:var(--muted);font-style:italic;}
.divider{height:1px;background:var(--border);flex-shrink:0;}
.snap-preview-area{flex:1;display:flex;flex-direction:column;gap:0.75rem;min-height:0;}
.snap-stack{position:relative;height:180px;flex-shrink:0;}
.snap-card-mini{position:absolute;background:white;border-radius:5px;box-shadow:0 2px 12px var(--shadow);padding:10px 12px;display:flex;flex-direction:column;gap:5px;}
.snap-card-mini:nth-child(1){width:115px;height:145px;left:0;top:12px;transform:rotate(-4deg);z-index:1;}
.snap-card-mini:nth-child(2){width:115px;height:145px;left:26px;top:2px;transform:rotate(1deg);z-index:2;}
.snap-card-mini:nth-child(3){width:115px;height:145px;left:54px;top:16px;transform:rotate(4deg);z-index:3;}
.mini-line{height:2px;background:#ccc;border-radius:2px;opacity:0.5;}
.mini-line:nth-child(1){width:75%;}.mini-line:nth-child(2){width:50%;}.mini-line:nth-child(3){width:65%;}
.snaps-link{font-family:"Caveat",cursive;font-size:1rem;color:var(--ink);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.snaps-link:hover{color:var(--red);}
.presence{display:flex;align-items:center;gap:8px;font-size:0.68rem;color:var(--muted);font-family:"Courier Prime",monospace;}
.pdots{display:flex;gap:4px;flex-wrap:wrap;}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--red);opacity:0.7;}
.pdot.you{background:#6b9adb;opacity:1;}
.typing-indicator{font-size:0.68rem;color:var(--muted);font-family:"Courier Prime",monospace;font-style:italic;min-height:1rem;transition:opacity 0.3s;}
.visitor-count{font-size:0.68rem;color:var(--muted);font-family:"Courier Prime",monospace;}

/* RIGHT */
.right{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg);}

/* STAGE */
.tw-stage{
  position:relative;
  width:700px;
  height:580px;
}

/* ── PAPER — comes up through top of typewriter ── */
.paper-outer{
  position:absolute;
  /* paper sits starting near top, extends down through the typewriter slot */
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  z-index:20;
  pointer-events:none;
}
.paper-sheet{
  background:var(--paper);
  min-height:600px;
  width:100%;
  box-shadow:2px 0 8px rgba(0,0,0,0.06),-2px 0 8px rgba(0,0,0,0.06);
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:8px 22px 16px;
  transition:transform 0.1s linear;
}
.paper-lines{display:flex;flex-direction:column;}
.paper-line{
  font-family:"Courier Prime",monospace;
  font-size:12px;
  line-height:1;
  height:22px;
  display:flex;
  align-items:center;
  white-space:pre;
  letter-spacing:0.05em;
}
.paper-line.black{color:var(--ink);}
.paper-line.red{color:var(--red);}
/* ghost lines (old) */
.paper-line.ghost{opacity:0.18;}
.cursor-blink{
  display:inline-block;width:7px;height:12px;
  background:var(--ink);vertical-align:middle;margin-left:1px;
  animation:blink 0.85s step-end infinite;
}
.cursor-blink.red{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* paper controls float above paper, below carriage */
.paper-controls{
  position:absolute;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  display:flex;
  justify-content:center;
  gap:10px;
  z-index:25;
  pointer-events:auto;
}
.ctrl-btn{
  font-family:"Caveat",cursive;
  font-size:0.8rem;
  background:rgba(250,248,244,0.9);
  border:1px solid var(--border);
  border-radius:20px;
  padding:3px 11px;
  cursor:pointer;
  color:var(--ink);
  display:flex;align-items:center;gap:5px;
  backdrop-filter:blur(4px);
  transition:background 0.15s;
  white-space:nowrap;
}
.ctrl-btn:hover{background:white;}
.ink-dot{width:9px;height:9px;border-radius:50%;background:var(--ink);display:inline-block;flex-shrink:0;transition:background 0.25s;}
.ink-dot.red{background:var(--red);}

/* ── CARRIAGE — slides left/right, sits ON TOP of paper, BELOW base ── */
.carriage-wrap{
  position:absolute;
  top:148px; /* vertically: across the paper slot area */
  left:0;
  width:100%;
  z-index:30;
  cursor:grab;
  touch-action:none;
  transition:transform 0.08s ease-out;
}
.carriage-wrap:active{cursor:grabbing;}
.carriage-img{width:100%;display:block;pointer-events:none;}
.drag-hint{
  position:absolute;
  top:-18px;left:60px;
  font-family:"Caveat",cursive;font-size:0.68rem;
  color:var(--muted);pointer-events:none;
  opacity:0;transition:opacity 0.4s;
}
.drag-hint.show{opacity:1;}

/* ── BASE — fixed on top of everything, keyboard shows through ── */
.base-wrap{
  position:absolute;
  bottom:0;left:0;
  width:100%;
  z-index:40;
  pointer-events:none;
}
.base-img{width:100%;display:block;}

/* ── KEY FLASH — sits between carriage and base ── */
.kfl{position:absolute;bottom:0;left:0;width:100%;height:100%;z-index:35;pointer-events:none;overflow:hidden;}
.kf{
  position:absolute;border-radius:50%;
  background:rgba(120,120,120,0.25);
  animation:kfAnim 0.3s ease-out forwards;
}
@keyframes kfAnim{0%{transform:scale(0);opacity:1}100%{transform:scale(1.1);opacity:0}}

/* night mode */
@media (prefers-color-scheme: dark) { }
.night .paper-sheet{background:#f5f0e8;}
.night .paper-line.black{color:#0d0d0b;}

/* BELL */
.bell{
  position:fixed;top:18px;right:18px;
  font-family:"Caveat",cursive;font-size:0.85rem;
  color:var(--red);opacity:0;pointer-events:none;
  transition:opacity 0.3s;z-index:200;
}
.bell.show{opacity:1;}

/* PAGE FULL CEREMONY */
.ceremony{
  position:fixed;inset:0;
  background:rgba(240,237,230,0.85);
  backdrop-filter:blur(12px);
  z-index:300;display:none;
  align-items:center;justify-content:center;
  flex-direction:column;gap:1rem;
}
.ceremony.open{display:flex;}
.ceremony-text{font-family:"Special Elite",serif;font-size:1.8rem;color:var(--ink);text-align:center;}
.ceremony-sub{font-family:"Courier Prime",monospace;font-size:0.8rem;color:var(--muted);font-style:italic;}
.ceremony-btn{
  font-family:"Caveat",cursive;font-size:1rem;
  background:var(--ink);color:white;
  border:none;border-radius:20px;padding:6px 20px;
  cursor:pointer;margin-top:0.5rem;
}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(237,237,234,0.75);
  backdrop-filter:blur(10px);
  z-index:100;display:none;
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--paper);border:1px solid var(--border);border-radius:14px;
  width:680px;max-height:72vh;display:flex;flex-direction:column;
  box-shadow:0 24px 64px rgba(0,0,0,0.12);overflow:hidden;
}
.modal-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:"Caveat",cursive;font-size:1.3rem;}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--muted);}
.modal-close:hover{color:var(--ink);}
.modal-body{overflow-y:auto;padding:1.5rem;flex:1;}
.modal-body::-webkit-scrollbar{width:3px;}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.snap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
.snap-card{background:white;border-radius:8px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;flex-direction:column;gap:3px;}
.snap-card-lines{display:flex;flex-direction:column;gap:2px;min-height:90px;}
.sc-line{font-family:"Courier Prime",monospace;font-size:7px;line-height:1.6;white-space:pre;overflow:hidden;text-overflow:ellipsis;color:var(--ink);}
.sc-line.red{color:var(--red);}
.snap-time{font-size:0.6rem;color:var(--muted);font-family:"Courier Prime",monospace;border-top:1px solid var(--border);padding-top:4px;margin-top:4px;}
.no-snaps{grid-column:1/-1;text-align:center;color:var(--muted);font-style:italic;font-size:0.85rem;padding:2rem;}
</style>
</head>
<body>
<div class="layout">

  <!-- LEFT -->
  <aside class="left">
    <div class="title">TISA <span>Type</span></div>
    <p class="blurb">
      Someone typed here before you.<br>
      Someone will type here after you.<br>
      Add your line. Leave it for the next person.
    </p>
    <div class="divider"></div>
    <div class="snap-preview-area">
      <div class="snap-stack" id="snapStack">
        <div class="snap-card-mini"><div class="mini-line"></div><div class="mini-line"></div><div class="mini-line"></div></div>
        <div class="snap-card-mini"><div class="mini-line"></div><div class="mini-line"></div></div>
        <div class="snap-card-mini"><div class="mini-line"></div><div class="mini-line"></div><div class="mini-line"></div></div>
      </div>
      <a class="snaps-link" id="openSnaps">snapshots ›</a>
    </div>
    <div class="divider"></div>
    <div class="presence">
      <div class="pdots" id="pdots"></div>
      <span id="plabel">just you</span>
    </div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="visitor-count" id="visitorCount"></div>
  </aside>

  <!-- RIGHT -->
  <main class="right">
    <div class="tw-stage" id="stage">

      <!-- paper controls above everything -->
      <div class="paper-controls">
        <button class="ctrl-btn" id="snapBtn">📷 take a snapshot</button>
        <button class="ctrl-btn" id="inkBtn">ink ribbon: <span class="ink-dot" id="inkDot"></span></button>
      </div>

      <!-- LAYER 1: PAPER (comes up through typewriter top) -->
      <div class="paper-outer" id="paperOuter">
        <div class="paper-sheet" id="paperSheet">
          <div class="paper-lines" id="paperLines"></div>
        </div>

// ── CONSTANTS ──
const CHARS_PER_LINE=42;
const CHAR_PX=11;
const MAX_OFFSET=CHARS_PER_LINE*CHAR_PX;
const LINE_H=22;

const MAX_LINES=100; // page full at 100

// ── STATE ──

// ── AUDIO (Web Audio API) ──
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playClick(){
  try{
    const ctx=getAudio();
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,4)*0.4;
    const s=ctx.createBufferSource();s.buffer=buf;
    const g=ctx.createGain();g.gain.setValueAtTime(0.6,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.04);
    s.connect(g);g.connect(ctx.destination);s.start();
  }catch(e){}
}
function playDing(){
  try{
    const ctx=getAudio();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.type="sine";o.frequency.setValueAtTime(880,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.3);
    g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.4);
  }catch(e){}
}

// ── CARRIAGE ──
function setCarriageX(x){
  carriageX=Math.max(-60,Math.min(x,START_X+40));
  carriageWrap.style.transform=`translateX(${carriageX-START_X}px)`;
}

// ── NIGHT MODE ──
function checkNight(){
  const h=new Date().getHours();
  document.body.classList.toggle("night",h>=22||h<6);
}
checkNight();setInterval(checkNight,60000);

// ── PAPER RENDER ──
function renderPaper(){
  paperLines.innerHTML="";
  const now=Date.now();
  const all=[...lines,{text:curText,color:curLineColor,cursor:true,ts:now}];
  all.forEach((l,i)=>{
    const div=document.createElement("div");
    // ghost: lines older than 7 days
    const age=now-(l.ts||now);
    const ghost=age>7*86400000;
    div.className=`paper-line ${l.color||"black"}${ghost?" ghost":""}`;
    if(l.cursor){
      const s=document.createElement("span");s.textContent=l.text;
      const c=document.createElement("span");c.className=`cursor-blink ${curLineColor}`;
      div.appendChild(s);div.appendChild(c);
    }else{div.textContent=l.text;}
    paperLines.appendChild(div);
  });
  // scroll paper up: move sheet upward so current line always visible at slot
  const totalLines=all.length;
  const visibleLines=8; // approx lines visible in slot
  const scrollUp=Math.max(0,(totalLines-visibleLines)*LINE_H);
  paperSheet.style.transform=`translateY(-${scrollUp}px)`;
}

// ── FIREBASE AUTH ──
signInAnonymously(auth).then(r=>{
  uid=r.user.uid;
  setupPresence();
  loadPaper();
  listenSnaps();
  incrementVisitors();
}).catch(console.error);

// ── PRESENCE + TYPING ──
function setupPresence(){
  const pr=ref(rtdb,`presence/${uid}`);
  set(pr,{online:true,typing:false});
  onDisconnect(pr).remove();
  onValue(ref(rtdb,"presence"),snap=>{
    const d=snap.val()||{};
    const users=Object.keys(d);
    pdots.innerHTML="";
    users.forEach(u=>{
      const dot=document.createElement("div");
      dot.className="pdot"+(u===uid?" you":"");
      pdots.appendChild(dot);
    });
    plabel.textContent=users.length===1?"just you":`${users.length} people here`;
    // typing indicator
    const othersTyping=users.filter(u=>u!==uid&&d[u]&&d[u].typing);
    typingIndicator.textContent=othersTyping.length>0?"someone is typing...":"";
  });
}
function setTyping(val){
  if(!uid)return;
  set(ref(rtdb,`presence/${uid}/typing`),val);
}

// ── VISITORS ──
async function incrementVisitors(){
  const vRef=doc(db,"meta","visitors");
  try{
    await updateDoc(vRef,{count:increment(1)});
  }catch{
    await setDoc(vRef,{count:1});
  }
  onSnapshot(doc(db,"meta","visitors"),snap=>{
    if(snap.exists()){
      const n=snap.data().count||0;
      visitorCount.textContent=`${n.toLocaleString()} people have typed here`;
    }
  });
}

// ── PAPER FIRESTORE ──
const paperRef=doc(db,"shared","paper");
async function loadPaper(){
  const snap=await getDoc(paperRef);
  lines=snap.exists()?(snap.data().lines||[]):[];
  renderPaper();
}
onSnapshot(paperRef,snap=>{
  if(!snap.exists()||isSyncing)return;
  lines=snap.data().lines||[];
  renderPaper();
});
async function savePaper(){
  isSyncing=true;
  await setDoc(paperRef,{lines:[...lines]});
  isSyncing=false;
}

// ── PAGE FULL ──
async function checkPageFull(){
  if(lines.length>=MAX_LINES){
    // auto snapshot
    await addDoc(collection(db,"snapshots"),{
      lines:lines.slice(-15),capturedAt:new Date().toISOString(),uid,autoArchive:true
    });
    // clear paper
    lines=[];curText="";
    await savePaper();
    setCarriageX(START_X);
    renderPaper();
    ceremony.classList.add("open");
  }
}
ceremonyBtn.addEventListener("click",()=>ceremony.classList.remove("open"));

// ── KEYBOARD ──
const PRINT=/^[ -~]$/;
document.addEventListener("keydown",e=>{
  if(modalOverlay.classList.contains("open")||ceremony.classList.contains("open"))return;
  if(e.ctrlKey||e.metaKey||e.altKey)return;

  if(e.key==="Enter"){e.preventDefault();doReturn();return;}
  if(e.key==="Backspace"){
    e.preventDefault();
    if(curText.length>0){
      curText=curText.slice(0,-1);
      setCarriageX(carriageX+CHAR_PX);
      renderPaper();
    }
    return;
  }
  if(!PRINT.test(e.key))return;
  if(curText.length>=CHARS_PER_LINE){showBell();return;}
  curText+=e.key;
  setCarriageX(carriageX-CHAR_PX);
  renderPaper();
  playClick();
  spawnFlash(e.key);
  if(curText.length>CHARS_PER_LINE*0.78)dragHint.classList.add("show");
  // typing presence
  setTyping(true);
  clearTimeout(typingTimeout);
  typingTimeout=setTimeout(()=>setTyping(false),2000);
});

function doReturn(){
  lines.push({text:curText,color:curLineColor,ts:Date.now()});
  curText="";
  savePaper();
  checkPageFull();
  // spring snap carriage back
  carriageWrap.style.transition="transform 0.45s cubic-bezier(0.22,1.8,0.36,1)";
  setCarriageX(START_X);
  dragHint.classList.remove("show");
  setTimeout(()=>{carriageWrap.style.transition="";},460);
  renderPaper();
  playDing();
}

function showBell(){
  bell.classList.add("show");
  setTimeout(()=>bell.classList.remove("show"),2200);
}

// ── DRAG CARRIAGE ──
let dragging=false,dragStartX=0,dragStartCarriage=0;
carriageWrap.addEventListener("mousedown",e=>{
  dragging=true;dragStartX=e.clientX;dragStartCarriage=carriageX;
  carriageWrap.style.transition="none";
  document.body.style.cursor="grabbing";
});
document.addEventListener("mousemove",e=>{
  if(!dragging)return;
  setCarriageX(dragStartCarriage+(e.clientX-dragStartX));
});
document.addEventListener("mouseup",()=>{
  if(!dragging)return;
  dragging=false;document.body.style.cursor="";
  if(carriageX>=START_X*0.65)doReturn();
  else carriageWrap.style.transition="";
});
carriageWrap.addEventListener("touchstart",e=>{
  dragging=true;dragStartX=e.touches[0].clientX;dragStartCarriage=carriageX;
  carriageWrap.style.transition="none";
},{passive:true});
document.addEventListener("touchmove",e=>{
  if(!dragging)return;
  setCarriageX(dragStartCarriage+(e.touches[0].clientX-dragStartX));
},{passive:true});
document.addEventListener("touchend",()=>{
  if(!dragging)return;dragging=false;
  if(carriageX>=START_X*0.65)doReturn();
  else carriageWrap.style.transition="";
});

// ── KEY FLASH ──
const KP={rows:[
  {keys:"1234567890-=",y:390,x0:142,gap:33},
  {keys:"qwertyuiop",y:426,x0:158,gap:33},
  {keys:"asdfghjkl",y:462,x0:170,gap:33},
  {keys:"zxcvbnm",y:498,x0:188,gap:33},
]};
function getKeyPos(k){
  const lk=k.toLowerCase();
  for(const row of KP.rows){const i=row.keys.indexOf(lk);if(i!==-1)return{x:row.x0+i*row.gap,y:row.y};}
  if(k===" ")return{x:350,y:530};
  return null;
}
function spawnFlash(k){
  const pos=getKeyPos(k);if(!pos)return;
  const el=document.createElement("div");el.className="kf";
  el.style.cssText=`width:32px;height:32px;left:${pos.x-16}px;top:${pos.y-16}px;`;
  kfl.appendChild(el);setTimeout(()=>el.remove(),320);
}

// ── INK ──
inkBtn.addEventListener("click",()=>{
  curLineColor=curLineColor==="black"?"red":"black";
  inkDot.className="ink-dot"+(curLineColor==="red"?" red":"");
});

// ── SNAPSHOTS ──
const snapsCol=collection(db,"snapshots");
snapBtn.addEventListener("click",async()=>{
  const all=[...lines];
  if(curText)all.push({text:curText,color:curLineColor,ts:Date.now()});
  const last15=all.slice(-15);
  if(!last15.length)return;
  await addDoc(snapsCol,{lines:last15,capturedAt:new Date().toISOString(),uid});
  const orig=snapBtn.innerHTML;
  snapBtn.textContent="✓ snapped!";
  setTimeout(()=>{snapBtn.innerHTML=orig;},1500);
});

function listenSnaps(){
  const q=query(snapsCol,orderBy("capturedAt","desc"));
  onSnapshot(q,snap=>{
    const docs=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderSnapGrid(docs);renderSnapPreview(docs);
  });
}

function renderSnapGrid(docs){
  snapGrid.innerHTML="";
  if(!docs.length){snapGrid.innerHTML='<p class="no-snaps">no snapshots yet.</p>';return;}
  docs.forEach(s=>{
    const card=document.createElement("div");card.className="snap-card";
    const ld=document.createElement("div");ld.className="snap-card-lines";
    (s.lines||[]).forEach(l=>{
      const p=document.createElement("div");p.className=`sc-line ${l.color||"black"}`;
      p.textContent=l.text||" ";ld.appendChild(p);
    });
    const t=document.createElement("div");t.className="snap-time";
    t.textContent=fmtTime(s.capturedAt);
    card.appendChild(ld);card.appendChild(t);snapGrid.appendChild(card);
  });
}

function renderSnapPreview(docs){
  const stack=document.getElementById("snapStack");
  if(!docs.length)return;
  stack.innerHTML="";
  docs.slice(0,3).reverse().forEach(s=>{
    const c=document.createElement("div");c.className="snap-card-mini";
    (s.lines||[]).slice(0,3).forEach(()=>{
      const l=document.createElement("div");l.className="mini-line";c.appendChild(l);
    });
    stack.appendChild(c);
  });
}

function fmtTime(iso){
  if(!iso)return"";
  const d=new Date(iso);
  return d.toLocaleDateString("en-IN",{month:"long",day:"numeric"})+" "+
    d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:false});
}

// ── MODAL ──
openSnaps.addEventListener("click",()=>modalOverlay.classList.add("open"));
closeModal.addEventListener("click",()=>modalOverlay.classList.remove("open"));
modalOverlay.addEventListener("click",e=>{if(e.target===modalOverlay)modalOverlay.classList.remove("open");});

renderPaper();
</script>
